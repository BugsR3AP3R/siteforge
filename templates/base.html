<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}SiteForge{% endblock %}</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root {
  --bg: #0a0a10;
  --surface: #13131e;
  --surface2: #1c1c2a;
  --surface3: #252535;
  --border: #2e2e42;
  --border2: #3a3a52;
  --accent: #6c63ff;
  --accent-hover: #8078ff;
  --accent2: #ff6584;
  --accent3: #43e97b;
  --accent4: #f7971e;
  --text: #e8e8f0;
  --text2: #a0a0c0;
  --muted: #6060a0;
  --danger: #ff4757;
  --success: #2ed573;
  --warning: #ffa502;
  --radius: 12px;
  --radius-sm: 8px;
  --shadow: 0 4px 24px rgba(0,0,0,0.4);
  --shadow-lg: 0 8px 48px rgba(0,0,0,0.6);
}
* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; }
body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); line-height:1.6; min-height:100vh; }
a { color:inherit; text-decoration:none; }
button, .btn { cursor:pointer; font-family:'DM Sans',sans-serif; }

/* TYPOGRAPHY */
h1,h2,h3,h4,h5 { font-family:'Syne',sans-serif; font-weight:700; line-height:1.2; }

/* BUTTONS */
.btn { display:inline-flex; align-items:center; gap:8px; padding:10px 20px; border-radius:var(--radius-sm); font-size:.9rem; font-weight:500; border:none; transition:all .2s; }
.btn-primary { background:var(--accent); color:#fff; }
.btn-primary:hover { background:var(--accent-hover); transform:translateY(-1px); box-shadow:0 4px 16px rgba(108,99,255,.4); }
.btn-secondary { background:var(--surface2); color:var(--text); border:1px solid var(--border); }
.btn-secondary:hover { background:var(--surface3); border-color:var(--border2); }
.btn-danger { background:var(--danger); color:#fff; }
.btn-danger:hover { background:#ff6b81; }
.btn-success { background:var(--success); color:#000; }
.btn-ghost { background:transparent; color:var(--text2); }
.btn-ghost:hover { color:var(--text); background:var(--surface2); }
.btn-lg { padding:14px 28px; font-size:1rem; border-radius:var(--radius); }
.btn-sm { padding:6px 14px; font-size:.82rem; }
.btn-icon { padding:8px; }

/* FORMS */
.form-group { margin-bottom:20px; }
.form-label { display:block; margin-bottom:6px; font-size:.85rem; font-weight:500; color:var(--text2); }
.form-input, .form-select, .form-textarea {
  width:100%; padding:12px 16px; background:var(--surface2); border:1px solid var(--border);
  border-radius:var(--radius-sm); color:var(--text); font-family:'DM Sans',sans-serif; font-size:.95rem;
  transition:border-color .2s, box-shadow .2s;
}
.form-input:focus, .form-select:focus, .form-textarea:focus {
  outline:none; border-color:var(--accent); box-shadow:0 0 0 3px rgba(108,99,255,.15);
}
.form-input::placeholder { color:var(--muted); }
.form-textarea { min-height:100px; resize:vertical; }
.form-select option { background:var(--surface2); }

/* CARDS */
.card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:24px; }
.card-hover:hover { border-color:var(--border2); box-shadow:var(--shadow); transform:translateY(-2px); transition:all .2s; }

/* ALERTS */
.alert { padding:14px 18px; border-radius:var(--radius-sm); margin-bottom:16px; font-size:.9rem; display:flex; align-items:center; gap:10px; }
.alert-success { background:rgba(46,213,115,.1); border:1px solid rgba(46,213,115,.3); color:var(--success); }
.alert-error { background:rgba(255,71,87,.1); border:1px solid rgba(255,71,87,.3); color:var(--danger); }
.alert-warning { background:rgba(255,165,2,.1); border:1px solid rgba(255,165,2,.3); color:var(--warning); }
.alert-info { background:rgba(108,99,255,.1); border:1px solid rgba(108,99,255,.3); color:var(--accent); }

/* BADGES */
.badge { display:inline-flex; align-items:center; gap:4px; padding:4px 10px; border-radius:100px; font-size:.75rem; font-weight:600; }
.badge-active { background:rgba(46,213,115,.15); color:var(--success); }
.badge-draft { background:rgba(160,160,192,.1); color:var(--text2); }
.badge-trial { background:rgba(247,151,30,.15); color:var(--accent4); }
.badge-published { background:rgba(108,99,255,.15); color:var(--accent); }
.badge-danger { background:rgba(255,71,87,.15); color:var(--danger); }

/* SCROLLBAR */
::-webkit-scrollbar { width:6px; height:6px; }
::-webkit-scrollbar-track { background:var(--bg); }
::-webkit-scrollbar-thumb { background:var(--border2); border-radius:3px; }
::-webkit-scrollbar-thumb:hover { background:var(--muted); }

/* UTILS */
.text-muted { color:var(--text2); }
.text-small { font-size:.85rem; }
.flex { display:flex; }
.flex-col { flex-direction:column; }
.items-center { align-items:center; }
.justify-between { justify-content:space-between; }
.gap-2 { gap:8px; }
.gap-3 { gap:12px; }
.gap-4 { gap:16px; }
.mt-1 { margin-top:4px; }
.mt-2 { margin-top:8px; }
.mt-3 { margin-top:12px; }
.mt-4 { margin-top:16px; }
.mb-3 { margin-bottom:12px; }
.mb-4 { margin-bottom:16px; }
.w-full { width:100%; }
.hidden { display:none; }

/* ANIMATIONS */
@keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:none} }
@keyframes slideIn { from{transform:translateX(-20px);opacity:0} to{transform:none;opacity:1} }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }
.animate-fade { animation:fadeIn .3s ease forwards; }

/* MESSAGES */
.messages-container { position:fixed; top:80px; right:20px; z-index:9999; display:flex; flex-direction:column; gap:8px; }
.message { padding:12px 18px; border-radius:var(--radius-sm); font-size:.9rem; background:var(--surface2); border:1px solid var(--border); max-width:360px; animation:fadeIn .3s ease; box-shadow:var(--shadow); display:flex; align-items:center; gap:10px; }
.message.success { border-color:rgba(46,213,115,.3); background:rgba(46,213,115,.08); }
.message.error { border-color:rgba(255,71,87,.3); background:rgba(255,71,87,.08); }
.message.warning { border-color:rgba(255,165,2,.3); background:rgba(255,165,2,.08); }
</style>
{% block extra_css %}{% endblock %}
</head>
<body>
{% if messages %}
<div class="messages-container">
  {% for message in messages %}
  <div class="message {{ message.tags }}" onclick="this.remove()">
    {% if message.tags == 'success' %}<i class="fa-solid fa-circle-check" style="color:var(--success)"></i>
    {% elif message.tags == 'error' %}<i class="fa-solid fa-circle-xmark" style="color:var(--danger)"></i>
    {% else %}<i class="fa-solid fa-circle-info" style="color:var(--accent)"></i>{% endif %}
    {{ message }}
  </div>
  {% endfor %}
</div>
<script>setTimeout(()=>document.querySelectorAll('.message').forEach(m=>m.remove()),5000)</script>
{% endif %}

{% block body %}{% endblock %}
</body>
</html>
